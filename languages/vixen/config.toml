name = "Vixen"
language_servers = ["vx-lsp"]
grammar = "vixen"
path_suffixes = ["vixen", "vx"]
line_comments = ["//"]
block_comments = [["/*", "*/"]]
tab_size = 2
autoclose_before = "]})"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = false },
    { start = "[", end = "]", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "`", end = "`", close = true, newline = false, not_in = ["string"] },
]
word_characters = ["_"]
